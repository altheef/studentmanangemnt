<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./style.css">
   
</head>
<body>

    <!-- Gradient Header -->
    <div class="main-header text-center mb-4">
        <div class="container">
            <h1 class="display-5 fw-bold mb-2">Student Manager</h1>
            <p class="lead opacity-90">Efficiently manage student records with ease</p>
        </div>
    </div>

    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-lg-11">

                <!-- Form Card -->
                <div class="card main-card form-card mb-4">
                    <div class="card-body p-5">
                        <div class="d-flex align-items-center mb-4">
                            <i class="fa fa-user-plus fa-2x text-primary me-3"></i>
                            <h4 class="mb-0 fw-semibold">Add or Edit Student</h4>
                        </div>

                        <form id="studentform">
                            <input type="hidden" id="editstudent">

                            <div class="row g-4">
                                <div class="col-md-6 col-lg-3">
                                    <div class="form-floating">
                                        <input type="text" id="name" class="form-control" placeholder="Full Name" required>
                                        <label for="name">Full Name</label>
                                    </div>
                                </div>
                                <div class="col-md-6 col-lg-3">
                                    <div class="form-floating">
                                        <input type="tel" id="phone" class="form-control" placeholder="Phone Number" required>
                                        <label for="phone">Phone Number</label>
                                    </div>
                                </div>
                                <div class="col-md-6 col-lg-3">
                                    <div class="form-floating">
                                        <input type="email" id="email" class="form-control" placeholder="Email Address" required>
                                        <label for="email">Email Address</label>
                                    </div>
                                </div>
                                <div class="col-md-6 col-lg-3">
                                    <div class="form-floating">
                                        <input type="number" id="mark" class="form-control" placeholder="Mark" min="0" max="100" required>
                                        <label for="mark">Mark / Score</label>
                                    </div>
                                </div>
                            </div>

                            <div class="d-flex gap-3 mt-5">
                                <button type="submit" class="btn btn-primary px-5">
                                    <i class="fa fa-plus me-2"></i>
                                    <span id="submitText">Add Student</span>
                                </button>
                                <button type="button" id="cancelEdit" class="btn btn-outline-secondary px-5 d-none">
                                    Cancel
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Search + Stats -->
                <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3">
                    <div class="input-group" style="max-width: 420px;">
                        <span class="input-group-text bg-white">
                            <i class="fa fa-search text-muted"></i>
                        </span>
                        <input type="text" id="searchstudent" 
                               class="form-control search-input" 
                               placeholder="Search students by name...">
                    </div>

                    <div id="studentCount" class="student-count text-muted d-flex align-items-center">
                        <i class="fa fa-users me-2"></i>
                        <span>0 Students</span>
                    </div>
                </div>

                <!-- Table Card -->
                <div class="card main-card table-card">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead>
                                    <tr>
                                        <th style="width: 70px;">#</th>
                                        <th>Name</th>
                                        <th>Phone</th>
                                        <th>Email</th>
                                        <th style="width: 120px;">Mark</th>
                                        <th style="width: 160px;">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="tablebody" class="align-middle"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
